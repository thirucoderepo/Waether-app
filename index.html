<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>WEATHERLY</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <header class="hero">
        <p class="eyebrow">WEATHERLY</p>
        <h1>Current weather for any city.</h1>
        <p class="intro">
          Enter a city and country to view temperature, humidity, wind, and
          clean weather icons.
        </p>
      </header>

      <main class="content">
        <section class="weather-panel">
          <form id="weather-form" class="weather-form" novalidate>
            <div class="field-row">
              <label for="city">City</label>
              <input
                id="city"
                name="city"
                type="text"
                placeholder="Sydney"
                autocomplete="off"
                required
              />
            </div>

            <div class="field-row">
              <label for="country">Country</label>
              <input
                id="country"
                name="country"
                type="text"
                placeholder="AU or Australia"
                autocomplete="off"
              />
            </div>

            <div class="field-row">
              <label for="apiKey">OpenWeatherMap API Key</label>
              <input
                id="apiKey"
                name="apiKey"
                type="password"
                placeholder="Enter API key (will not be committed)"
                autocomplete="off"
              />
              <label style="font-size:0.9rem; color:#67768b; margin-top:6px;">
                <input id="rememberKey" type="checkbox" /> Remember key in this browser
              </label>
            </div>

            <button type="submit" class="primary-button">Get Weather</button>
            <p class="message" id="message" aria-live="polite"></p>
          </form>

          <section class="weather-result hidden" id="weather-result">
            <div class="result-heading">
              <div>
                <p class="location" id="location"></p>
                <p class="condition" id="description"></p>
              </div>
              <img
                id="weather-icon"
                class="weather-icon"
                src=""
                alt=""
              />
            </div>

            <p class="temperature" id="temperature"></p>

            <div class="details-grid">
              <div class="detail-card">
                <span>Humidity</span>
                <strong id="humidity"></strong>
              </div>
              <div class="detail-card">
                <span>Wind speed</span>
                <strong id="wind"></strong>
              </div>
            </div>
          </section>
        </section>
      </main>

      <footer class="footer">
        <p>
          Static GitHub Pages-ready weather app. Keep API keys out of the repo and
          use a restricted free-tier key in production.
        </p>
      </footer>
    </div>

    <script src="script.js"></script>
  </body>
</html>
